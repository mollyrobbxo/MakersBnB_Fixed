<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity5" >

<head>
    <title>MakersBnB - Welcome</title>
</head>

<body>

<div sec:authorize="isAuthenticated()">
     <span sec:authentication="principal.attributes['email']"></span>
</div>
<div sec:authorize="isAuthenticated()">
    Welcome <span sec:authentication="name"></span>!
</div>
<div sec:authorize="isAuthenticated()">
    <form th:action="@{/logout}" method="post">
        <button type="submit">Logout</button>
    </form>
</div>
<div sec:authorize="!isAuthenticated()">
    <a href="/oauth2/authorization/okta">Login</a>
</div>

    <h3 th:text="${nSpaces} + ' spaces are waiting to be discovered'"></h3>

<p th:text="${nBookings} + ' bookings were made last week'"></p>

<a href="/spaces">See available spaces</a>

<h3>Recent reviews</h3>
<ul>
    <!-- using th:each we tell Thymeleaf to render an li for each review -->
    <li th:each="review : ${reviews}" th:text="${review}"></li>
</ul>
<a href="/spaces/new">List a space!</a>
<br>
<br>
<a href="/contactus">Contact us here</a>
<br>
<br>
<a href="/team">View the team</a>
</body>

</html>
