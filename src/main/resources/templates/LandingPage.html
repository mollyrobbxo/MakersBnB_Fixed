<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity5">

<head>
    <title>MakersBnB - Welcome</title>
    <link rel="stylesheet" href="/styles.css">
</head>

<body>

<header class="navbar">

    <div class="logo">
        MakersBnB
    </div>

    <div class="nav-links">

        <div sec:authorize="isAuthenticated()">
            Welcome <span sec:authentication="name"></span>
        </div>

        <div sec:authorize="isAuthenticated()">
            <form th:action="@{/logout}" method="post">
                <button class="logout-btn">Logout</button>
            </form>
        </div>

        <div sec:authorize="!isAuthenticated()">
            <a class="login-btn" href="/oauth2/authorization/okta">Login</a>
        </div>

    </div>

</header>

<section class="hero">

    <h1>Find your perfect stay</h1>

    <p th:text="${nSpaces} + ' spaces waiting to be discovered'"></p>

    <a class="cta-button" href="/spaces">Explore Spaces</a>

</section>

<section class="reviews">

    <h2>Recent reviews</h2>

    <ul class="review-list">
        <li th:each="review : ${reviews}" th:text="${review}"></li>
    </ul>

</section>

<section class="actions">

    <a class="primary-btn" href="/spaces/new">List a space</a>

    <a href="/contactus">Contact us</a>

    <a href="/team">Meet the team</a>

</section>

</body>

</html>
