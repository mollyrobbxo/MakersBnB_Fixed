<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en-gb">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <!-- I assume you added price and description columns to spaces in a previous Page -->
    <form th:action="@{/spaces}" th:object="${space}" method="post">
        <label th:for="name">Name:</label>
        <input type="text" th:field="*{name}"/> <br>
        <label th:for="description">Description:</label>
        <input type="text" th:field="*{description}"/> <br>
        <label th:for="rules">Rules for guests:</label>
        <input type="text" th:field="*{rules}"/> <br>
        <label th:for="price">Price (per night): £</label>
        <input type="number" th:field="*{price}" step="0.01" min="0"/> <br><br>
        <input type="submit" value="Submit"/>
        <input type="reset" value="Reset" />
    </form>
<br><br>
    <a href="/">Go to homepage</a>

</body>
</html>
